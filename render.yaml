services:
  - type: web
    name: stockauto-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000
